[app]
# Name shown in the badge menu
name = "HA Bridge"
# Submenu placement. This app needs Wi-Fi, so "Apps" is the natural home.
category = "Apps"
# This app needs the network, so ask the OS to turn Wi-Fi on when it opens.
wifi_preference = true

[entry]
# The Application subclass exported via __app_export__
class = "HABridgeApp"

[metadata]
author = "Jim Morrison"
license = "LGPL-3.0-only"
url = "https://github.com/morrisonj/tildagon-ha-bridge"
description = "Bridges the Tildagon to Home Assistant over MQTT (LEDs, battery, screen)."
version = 1
